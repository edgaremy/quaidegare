    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quai de Gare</title>
    <script>
      // Capture the NATIVE history.replaceState here, before any module scripts
      // load and before the svelte5-router monkey-patches it.
      // Home.svelte uses this to sync the URL while scrolling without
      // triggering a router re-render.
      window._nativeReplaceState = history.replaceState.bind(history);

      // Restore path from sessionStorage if redirected from 404
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.pathname) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
